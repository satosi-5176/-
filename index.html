<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Loop Slider</title>
<meta property="og:title" content="Loop Slider" />
<meta property="og:description" content="Swipe puzzle game" />
<meta name="description" content="Swipe puzzle game" />
<style>
  :root{--bg:#0d1016;--text:#f4f7fb}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none;touch-action:none}
  #stageWrap{position:relative;width:100%;height:100%;min-height:0;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  #resetBtn{position:absolute;left:50%;top:calc(12px + env(safe-area-inset-top));transform:translateX(-50%);z-index:10;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 22px;background:rgba(0,0,0,.56);color:#fff;font-size:15px;font-weight:900;letter-spacing:.04em;line-height:1;box-shadow:0 8px 24px rgba(0,0,0,.24);backdrop-filter:blur(8px);cursor:pointer;pointer-events:auto}
  #resetBtn:active{transform:translateX(-50%) scale(.96)}
  #winOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;padding:24px;background:rgba(0,0,0,.34);backdrop-filter:blur(4px);pointer-events:auto}
  #winOverlay.show{display:flex}
  #winBox{position:relative;max-width:min(88vw,420px);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:30px 28px;background:rgba(8,12,18,.88);color:#fff;box-shadow:0 18px 60px rgba(0,0,0,.42);text-align:center}
  #winText{font-size:24px;font-weight:950;line-height:1.35;letter-spacing:.02em;white-space:nowrap}
  #winClose{position:absolute;right:10px;top:8px;width:34px;height:34px;border:0;border-radius:999px;background:rgba(255,255,255,.10);color:#fff;font-size:24px;line-height:30px;cursor:pointer;pointer-events:auto}
</style>
</head>
<body>
<div id="stageWrap">
  <canvas id="stage"></canvas>
  <button id="resetBtn" type="button">リセット</button>
  <div id="winOverlay" aria-hidden="true">
    <div id="winBox" role="dialog" aria-modal="true">
      <button id="winClose" type="button" aria-label="close">×</button>
      <div id="winText">天才だ！さすがだね😘</div>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
